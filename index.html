<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--verde:#0D4A45;--arena:#C8AD96;--crema:#F5F0E8;--beige:#E8E0D4;--negro:#111;--gris:#666;--blanco:#fff}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;font-weight:300;color:var(--negro);background:var(--blanco);line-height:1.6}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,74,69,0.97);backdrop-filter:blur(8px);padding:14px 40px;display:flex;align-items:center;justify-content:space-between}
nav img{height:38px;width:auto}
nav a{color:var(--crema);text-decoration:none;font-size:13px;letter-spacing:.08em;font-weight:400;opacity:.85;transition:opacity .2s}
nav a:hover{opacity:1}
.hero{margin-top:66px;position:relative;height:92vh;min-height:540px;overflow:hidden}
.hero-slides{display:flex;height:100%;transition:transform .75s cubic-bezier(.4,0,.2,1)}
.hero-slide{min-width:100%;height:100%;background-size:cover;background-position:center}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(13,74,69,.75) 0%,rgba(13,74,69,.2) 60%,transparent 100%)}
.hero-content{position:absolute;bottom:0;left:0;padding:0 56px 64px;max-width:640px}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--arena);margin-bottom:14px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5.5vw,66px);font-weight:300;line-height:1.05;color:var(--blanco);margin-bottom:22px}
.hero-title em{font-style:italic;color:var(--arena)}
.hero-price{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--crema);margin-bottom:28px;line-height:1.2}
.hero-price small{font-size:.55em;font-family:'Inter',sans-serif}
.hero-price span{font-family:'Inter',sans-serif;font-size:12px;color:var(--arena);display:block;margin-top:4px;letter-spacing:.03em}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:var(--arena);color:var(--negro);padding:14px 28px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;letter-spacing:.05em;text-decoration:none;display:inline-block;transition:background .2s,transform .15s}
.btn-primary:hover{background:#b8997f;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.45);color:var(--blanco);padding:14px 28px;font-family:'Inter',sans-serif;font-size:13px;letter-spacing:.05em;text-decoration:none;display:inline-block;transition:border-color .2s,background .2s}
.btn-ghost:hover{border-color:var(--blanco);background:rgba(255,255,255,.08)}
.slide-dots{position:absolute;bottom:22px;right:40px;display:flex;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;border:none;transition:background .3s,transform .3s;padding:0}
.dot.active{background:var(--arena);transform:scale(1.4)}
.stats-bar{background:var(--verde);padding:22px 56px;display:grid;grid-template-columns:repeat(6,1fr);gap:0}
.stat{text-align:center;padding:8px 12px;border-right:1px solid rgba(255,255,255,.1)}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--arena);display:block}
.stat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:2px}
section{padding:80px 56px}
.sec-eyebrow{font-size:10px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--arena);margin-bottom:10px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.5vw,44px);font-weight:300;line-height:1.12;color:var(--verde);margin-bottom:28px}
.descripcion{background:var(--crema)}
.desc-grid{display:grid;grid-template-columns:1fr 400px;gap:56px;align-items:start}
.desc-text p{font-size:15px;color:#444;line-height:1.85;margin-bottom:18px}
.includes-list{list-style:none;margin-top:6px}
.includes-list li{padding:9px 0;border-bottom:1px solid var(--beige);font-size:14px;color:#444;display:flex;align-items:center;gap:10px}
.includes-list li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--arena);flex-shrink:0}
.card-precio{background:var(--verde);padding:40px;color:var(--blanco);position:sticky;top:86px}
.card-precio .p-num{font-family:'Cormorant Garamond',serif;font-size:44px;color:var(--arena);line-height:1}
.card-precio .p-sub{font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.04em;margin-top:4px;margin-bottom:24px}
.cond-row{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:13px;color:rgba(255,255,255,.75);display:flex;justify-content:space-between;gap:8px}
.cond-row strong{color:var(--blanco);text-align:right}
.btn-wa{display:block;background:#25D366;color:var(--blanco);text-align:center;padding:14px;font-size:14px;font-weight:500;letter-spacing:.04em;text-decoration:none;margin-top:24px;transition:background .2s}
.btn-wa:hover{background:#1ebe5b}
.btn-tel{display:block;background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--blanco);text-align:center;padding:12px;font-size:13px;letter-spacing:.04em;text-decoration:none;margin-top:8px;transition:border-color .2s}
.btn-tel:hover{border-color:var(--blanco)}
.caracteristicas{background:var(--blanco)}
.carac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:4px}
.carac-item{background:var(--crema);padding:28px 22px;transition:background .2s}
.carac-item:hover{background:var(--beige)}
.carac-icon{font-size:22px;margin-bottom:10px;display:block}
.carac-titulo{font-size:13px;font-weight:500;letter-spacing:.03em;color:var(--verde);margin-bottom:4px}
.carac-desc{font-size:13px;color:var(--gris);line-height:1.5}
.tour-sec{background:var(--negro);padding:0}
.tour-header{padding:56px 56px 32px}
.tour-header .sec-eyebrow{color:var(--arena)}
.tour-header .sec-title{color:var(--crema)}
.tour-header p{color:rgba(255,255,255,.55);font-size:15px;max-width:500px}
.tour-wrap{width:100%;height:560px}
.tour-wrap iframe{width:100%;height:100%;border:none;display:block}
.galeria{background:var(--crema)}
.gal-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:auto auto;gap:4px;margin-top:8px}
.gal-grid img{width:100%;height:220px;object-fit:cover;display:block;transition:opacity .2s}
.gal-grid img:hover{opacity:.88}
.gal-grid img:first-child{grid-column:span 2;grid-row:span 2;height:444px}
.condiciones{background:var(--blanco)}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px}
.cond-block h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--verde);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--beige)}
.cond-block ul{list-style:none}
.cond-block li{padding:9px 0;font-size:14px;color:#444;border-bottom:1px solid #f0ece4;display:flex;align-items:flex-start;gap:8px}
.cond-block li::before{content:'—';color:var(--arena);flex-shrink:0}
footer{background:var(--verde);padding:48px 56px 28px;display:grid;grid-template-columns:auto 1fr auto;gap:40px;align-items:start}
footer img{height:48px}
.f-info p{color:rgba(255,255,255,.65);font-size:13px;line-height:1.9}
.f-info strong{color:var(--crema)}
.f-contact a{display:block;color:var(--arena);text-decoration:none;font-size:14px;margin-bottom:8px;transition:color .2s}
.f-contact a:hover{color:var(--crema)}
.f-bottom{background:var(--verde);padding:16px 56px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.05em}
@media(max-width:900px){
  .stats-bar{grid-template-columns:repeat(3,1fr)}
  .desc-grid{grid-template-columns:1fr}
  .carac-grid{grid-template-columns:repeat(2,1fr)}
  .gal-grid{grid-template-columns:repeat(2,1fr)}
  .gal-grid img:first-child{grid-column:span 2;height:260px}
  .gal-grid img{height:170px}
  .cond-grid{grid-template-columns:1fr}
  footer{grid-template-columns:1fr}
}
@media(max-width:600px){
  section{padding:52px 20px}
  .hero-content{padding:0 20px 44px}
  .stats-bar{padding:18px 20px;grid-template-columns:repeat(3,1fr)}
  nav{padding:12px 20px}
  .f-bottom{padding:14px 20px}
}
</style>
</head>
